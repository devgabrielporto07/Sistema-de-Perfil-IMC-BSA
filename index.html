<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Perfil da Saúde (IMC) (BSA)</title>
    <link rel="stylesheet" href="script.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>SISTEMA DE PERFIL DA SAÚDE (IMC) (BSA)</h1>
            <div class="separador">-=- -=- -=- -=- -=- -=- -=- -=- -=-</div>
        </div>

        <form id="formPerfil" class="form-container">
            <div class="form-group">
                <label for="nameuser">Digite seu nome completo:</label>
                <input 
                    type="text" 
                    id="nameuser" 
                    name="nameuser" 
                    placeholder="Seu nome aqui"
                    required
                >
            </div>

            <div class="form-group">
                <label for="age">Digite a sua idade:</label>
                <input 
                    type="number" 
                    id="age" 
                    name="age" 
                    min="1"
                    max="150"
                    placeholder="Sua idade"
                    required
                >
            </div>

            <div class="form-group">
                <label for="altura">Digite a sua altura em (metros):</label>
                <input 
                    type="number" 
                    id="altura" 
                    name="altura" 
                    min="0.5"
                    max="3"
                    step="0.01"
                    placeholder="Ex: 1.75"
                    required
                >
            </div>

            <div class="form-group">
                <label for="peso">Digite o quanto você pesa em (Kg):</label>
                <input 
                    type="number" 
                    id="peso" 
                    name="peso" 
                    min="1"
                    max="500"
                    step="0.1"
                    placeholder="Ex: 75.5"
                    required
                >
            </div>

            <button type="submit" class="btn-analizar">Analisar Perfil</button>
        </form>

        <div id="resultados" class="resultados-container" style="display: none;">
            <div class="info-pessoal">
                <p id="saudacao"></p>
                <p id="idade"></p>
                <p id="altura"></p>
                <p id="peso"></p>
            </div>

            <div class="analise-nome">
                <p id="maiuscula"></p>
                <p id="minuscula"></p>
            </div>

            <div class="fatiamento-string">
                <p id="totalLetras"></p>
                <p id="primeiroNome"></p>
                <p id="tresLetras"></p>
                <p id="quatroUltimas"></p>
            </div>

            <div class="analise-resultado">
                <h2>RESULTADO</h2>
                <div id="classificacaoIMC" class="classificacao"></div>
                <p id="valorBSA"></p>
                <p id="valorIMC"></p>
            </div>

            <div class="programa-finalizado">
                <p id="finalizado"></p>
            </div>

            <button type="button" class="btn-novoCalculo" onclick="limparFormulario()">Novo Cálculo</button>
        </div>
    </div>

    <script src="lógica.js"></script>
</body>
</html>
